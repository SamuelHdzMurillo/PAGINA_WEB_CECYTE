<div class="a11y-widget a11y-widget--bottom-left" data-a11y-root>
    <button
        id="a11y-toggle"
        type="button"
        class="a11y-toggle"
        aria-expanded="false"
        aria-controls="a11y-panel"
        aria-haspopup="dialog"
        data-a11y-attr="aria-label:ariaLabels.toggle"
    >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="a11y-toggle-icon">
            <circle cx="12" cy="5" r="1" />
            <path d="m9 20 3-6 3 6" />
            <path d="m6 8 6 2 6-2" />
            <path d="M12 10v4" />
        </svg>
    </button>

    <section
        id="a11y-panel"
        class="a11y-panel"
        role="dialog"
        aria-modal="false"
        aria-hidden="true"
        aria-labelledby="a11y-title"
        hidden
    >
        <header class="a11y-header">
            <div class="a11y-header-top">
                <div class="a11y-heading">
                    <p class="a11y-eyebrow" data-a11y-text="labels.eyebrow">Accesibilidad</p>
                    <h2 id="a11y-title" class="a11y-title" data-a11y-text="labels.title">Opciones de accesibilidad</h2>
                </div>

                <button
                    type="button"
                    class="a11y-close"
                    data-a11y-close
                    data-a11y-attr="aria-label:ariaLabels.close"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10" />
                        <path d="m15 9-6 6" />
                        <path d="m9 9 6 6" />
                    </svg>
                </button>
            </div>

            <div class="a11y-reset-row">
                <button
                    type="button"
                    class="a11y-reset"
                    data-a11y="reset"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    <span data-a11y-text="labels.reset">Restablecer</span>
                </button>
            </div>
        </header>

        <div class="a11y-sections">
            <fieldset class="a11y-section">
                <legend class="a11y-legend" data-a11y-text="labels.visual">Visual</legend>

                <div class="a11y-font-actions">
                    <button
                        type="button"
                        class="a11y-font-button"
                        data-a11y="fontDec"
                        data-a11y-attr="aria-label:ariaLabels.fontDec"
                    >
                        <span data-a11y-text="labels.fontDec">A-</span>
                    </button>

                    <button
                        type="button"
                        class="a11y-font-button"
                        data-a11y="fontInc"
                        data-a11y-attr="aria-label:ariaLabels.fontInc"
                    >
                        <span data-a11y-text="labels.fontInc">A+</span>
                    </button>
                </div>

                <div class="a11y-controls-grid">
                    <button type="button" class="a11y-control-button" data-a11y="grayscale" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 18a6 6 0 0 0 0-12v12z" />
                        </svg>
                        <span data-a11y-text="labels.grayscale">Escala de grises</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="contrast" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 2v2" />
                            <path d="M12 20v2" />
                            <path d="m4.93 4.93 1.41 1.41" />
                            <path d="m17.66 17.66 1.41 1.41" />
                            <path d="M2 12h2" />
                            <path d="M20 12h2" />
                            <path d="m6.34 17.66-1.41 1.41" />
                            <path d="m19.07 4.93-1.41 1.41" />
                        </svg>
                        <span data-a11y-text="labels.contrast">Alto contraste</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="highlightLinks" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M13 21h8" />
                            <path d="m15 5 4 4" />
                            <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
                        </svg>
                        <span data-a11y-text="labels.highlightLinks">Resaltar enlaces</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="cursorSize" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M14 4.1 12 6" />
                            <path d="m5.1 8-2.9-.8" />
                            <path d="m6 12-1.9 2" />
                            <path d="M7.2 2.2 8 5.1" />
                            <path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z" />
                        </svg>
                        <span data-a11y-text="labels.cursorSize">Cursor grande</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="darkMode" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                        <span data-a11y-text="labels.darkMode">Modo oscuro</span>
                    </button>
                </div>
            </fieldset>

            <fieldset class="a11y-section">
                <legend class="a11y-legend" data-a11y-text="labels.reading">Lectura</legend>

                <div class="a11y-controls-grid">
                    <button type="button" class="a11y-control-button" data-a11y="readingMask" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M21 9H3" />
                            <path d="M21 15H3" />
                        </svg>
                        <span data-a11y-text="labels.readingMask">Máscara de lectura</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="readingGuide" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M8 12h8" />
                        </svg>
                        <span data-a11y-text="labels.readingGuide">Guía de lectura</span>
                    </button>

                    <button type="button" class="a11y-control-button" data-a11y="dyslexiaFont" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 4v16" />
                            <path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2" />
                            <path d="M9 20h6" />
                        </svg>
                        <span data-a11y-text="labels.dyslexiaFont">Tipografía para dislexia</span>
                    </button>
                </div>
            </fieldset>

            <fieldset class="a11y-section">
                <legend class="a11y-legend" data-a11y-text="labels.spacing">Espaciado</legend>

                <div class="a11y-spacing-stack">
                    <div class="a11y-spacing-card">
                        <button type="button" class="a11y-control-button a11y-control-button--flat" data-a11y="verticalSpacing">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M12 2v20" />
                                <path d="m8 18 4 4 4-4" />
                                <path d="m8 6 4-4 4 4" />
                            </svg>
                            <span data-a11y-text="labels.verticalSpacing">Espaciado vertical</span>
                        </button>

                        <div class="a11y-level-row" aria-label="Niveles de espaciado vertical">
                            <button type="button" class="a11y-level-button" data-a11y-level="verticalSpacing" data-level="1" data-a11y-attr="aria-label:ariaLabels.verticalSpacingLevel1" aria-pressed="false">1</button>
                            <button type="button" class="a11y-level-button" data-a11y-level="verticalSpacing" data-level="2" data-a11y-attr="aria-label:ariaLabels.verticalSpacingLevel2" aria-pressed="false">2</button>
                            <button type="button" class="a11y-level-button" data-a11y-level="verticalSpacing" data-level="3" data-a11y-attr="aria-label:ariaLabels.verticalSpacingLevel3" aria-pressed="false">3</button>
                        </div>
                    </div>

                    <div class="a11y-spacing-card">
                        <button type="button" class="a11y-control-button a11y-control-button--flat" data-a11y="horizontalSpacing">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="m18 8 4 4-4 4" />
                                <path d="M2 12h20" />
                                <path d="m6 8-4 4 4 4" />
                            </svg>
                            <span data-a11y-text="labels.horizontalSpacing">Espaciado horizontal</span>
                        </button>

                        <div class="a11y-level-row" aria-label="Niveles de espaciado horizontal">
                            <button type="button" class="a11y-level-button" data-a11y-level="horizontalSpacing" data-level="1" data-a11y-attr="aria-label:ariaLabels.horizontalSpacingLevel1" aria-pressed="false">1</button>
                            <button type="button" class="a11y-level-button" data-a11y-level="horizontalSpacing" data-level="2" data-a11y-attr="aria-label:ariaLabels.horizontalSpacingLevel2" aria-pressed="false">2</button>
                            <button type="button" class="a11y-level-button" data-a11y-level="horizontalSpacing" data-level="3" data-a11y-attr="aria-label:ariaLabels.horizontalSpacingLevel3" aria-pressed="false">3</button>
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="a11y-section">
                <legend class="a11y-legend" data-a11y-text="labels.assistance">Asistencia</legend>

                <div class="a11y-controls-grid">
                    <button type="button" class="a11y-control-button" data-a11y="screenReader" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M8.8 20v-4.1l1.9.2a2.3 2.3 0 0 0 2.164-2.1V8.3A5.37 5.37 0 0 0 2 8.25c0 2.8.656 3.054 1 4.55a5.77 5.77 0 0 1 .029 2.758L2 20" />
                            <path d="M19.8 17.8a7.5 7.5 0 0 0 .003-10.603" />
                            <path d="M17 15a3.5 3.5 0 0 0-.025-4.975" />
                        </svg>
                        <span data-a11y-text="labels.screenReader">Asistente de lectura</span>
                    </button>
                </div>
            </fieldset>

            <div class="a11y-logo-wrap">
                <img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    data-a11y-logo
                    alt="Logotipo del Instituto"
                    class="a11y-logo"
                    loading="lazy"
                >
            </div>

            <div class="a11y-more-wrap">
                <a
                    href="https://transparenciaparaelpueblo.bcs.gob.mx/accesibilidad/saber-mas"
                    class="a11y-more-link"
                    data-a11y-href="moreInfoUrl"
                    data-a11y-text="labels.moreLink"
                >
                    Saber más
                </a>
            </div>
        </div>
    </section>
</div>
